name: Deploy to Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Firebase Production
    runs-on: ubuntu-latest
    environment: production

    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FUNCTIONS_REGION: ${{ secrets.NEXT_PUBLIC_FUNCTIONS_REGION }}
      NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID }}
      NEXT_PUBLIC_USE_EMULATORS: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-deploy-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-deploy-

      - name: Build shared packages
        run: pnpm turbo build --filter=@ats/shared-types

      - name: Crear .env para Cloud Functions
        run: |
          {
            echo "GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}"
            echo "GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}"
            echo "GMAIL_MOCK=false"
            echo "CALENDAR_WEBHOOK_URL=${{ secrets.CALENDAR_WEBHOOK_URL }}"
            echo "ALLOWED_ORIGIN=${{ secrets.ALLOWED_ORIGIN }}"
          } > apps/functions/.env

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools@14

      - name: Habilitar Web Frameworks
        run: firebase experiments:enable webframeworks

      - name: Deploy
        run: firebase deploy --only hosting,functions,firestore,storage --project ${{ secrets.FIREBASE_PROJECT_ID }}
