name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - run: pnpm lint

      - run: pnpm test

  deploy:
    name: Deploy to Firebase Staging
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write

    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FUNCTIONS_REGION: ${{ secrets.NEXT_PUBLIC_FUNCTIONS_REGION }}
      NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID }}
      NEXT_PUBLIC_USE_EMULATORS: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-deploy-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-deploy-

      - name: Build shared packages
        run: pnpm turbo build --filter=@ats/shared-types

      - name: Crear .env para Cloud Functions
        run: |
          {
            echo "GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}"
            echo "GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}"
            echo "GMAIL_MOCK=false"
            echo "CALENDAR_WEBHOOK_URL=${{ secrets.CALENDAR_WEBHOOK_URL }}"
            echo "ALLOWED_ORIGIN=${{ secrets.ALLOWED_ORIGIN }}"
          } > apps/functions/.env

      - name: Autenticar con Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-actions-deploy@ats-tema-ort.iam.gserviceaccount.com
          token_format: access_token

      - name: Instalar esbuild fuera del monorepo
        working-directory: /tmp
        run: |
          npm init -y
          npm install esbuild@0.19.12
          echo "/tmp/node_modules/.bin" >> $GITHUB_PATH

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools@14

      - name: Habilitar Web Frameworks
        run: firebase experiments:enable webframeworks
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }}

      - name: Deploy
        run: firebase deploy --only hosting,functions,firestore,storage --project ats-tema-ort
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }}
